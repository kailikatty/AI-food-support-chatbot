<!DOCTYPE html>
<html>
<head>
<title>Food Support Chat</title>

<style>
body {
    font-family: sans-serif;
    background: #f0f2f5;
}

.chat-container {
    width: 420px;
    height: 680px;
    background: white;
    margin: 40px auto;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    background: #00b14f;
    color: white;
    padding: 16px;
    font-weight: bold;
}

.quick-title {
    padding: 10px;
    font-size: 13px;
}

.quick-buttons {
    padding: 10px;
}

.quick-buttons button {
    margin: 3px;
    padding: 6px 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.input-area {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">Food Support Chat 💬</div>

<div class="quick-title">
Please select the issue:
</div>

<div class="quick-buttons">
<button onclick="quick('My order is late')">1</button>
<button onclick="quick('Wrong order')">2</button>
<button onclick="quick('Food issue')">3</button>
<button onclick="quick('Not received')">4</button>
<button onclick="quick('Cancel order')">5</button>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<script>
function add(text) {
    const box = document.getElementById("messages");
    box.innerHTML += "<div>" + text + "</div>";
}

function send() {
    const input = document.getElementById("msg");
    const text = input.value;

    if (!text) return;

    add("You: " + text);

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message:text})
    })
    .then(r => r.json())
    .then(d => add("Bot: " + d.reply))
    .catch(() => add("Error"));

    input.value = "";
}

function quick(text) {
    document.getElementById("msg").value = text;
    send();
}

document.getElementById("msg").addEventListener("keydown", e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
